<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>可视化后台（纯预览编辑）</title>
  <style>
    body{margin:0;background:#0b1220;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    .bar{position:fixed;left:0;right:0;top:0;z-index:9999;display:flex;gap:8px;align-items:center;padding:10px 12px;background:rgba(9,14,26,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.15)}
    .btn{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;background:#1d4ed8;color:#fff}
    .btn.gray{background:#334155}
    .msg{font-size:12px;color:#d1d5db;margin-left:6px}
    #live{position:fixed;left:0;right:0;top:52px;bottom:0;width:100%;height:calc(100vh - 52px);border:0;background:#fff}
  </style>
</head>
<body>
  <div class="bar">
    <button class="btn gray" onclick="openPage('/')">首页</button>
    <button class="btn gray" onclick="openPage('/scene.html')">智能场景</button>
    <button class="btn gray" onclick="openPage('/iot.html')">IoT</button>
    <button class="btn gray" onclick="openPage('/about.html')">关于</button>
    <button class="btn gray" onclick="openPage('/contact.html')">联系</button>
    <button class="btn" onclick="saveAll(false)">保存</button>
    <button class="btn gray" onclick="toggleAutoSave()" id="autoBtn">自动保存：开</button>
    <input id="pick" type="file" accept="image/*" style="display:none" onchange="pickImage(this)">
    <span id="msg" class="msg">直接在预览里点文字编辑；点图片/背景可上传替换</span>
  </div>
  <iframe id="live" src="/"></iframe>

<script>
let data={};
let autoSave=true;
let t=null;
let imageKey='';

async function loadData(){ data = await fetch('/api/content').then(r=>r.json()); }
function setMsg(s){ document.getElementById('msg').textContent=s; }
function toggleAutoSave(){ autoSave=!autoSave; document.getElementById('autoBtn').textContent='自动保存：'+(autoSave?'开':'关'); setMsg(autoSave?'自动保存已开启（停3秒保存）':'自动保存已关闭'); }
function debounceSave(){ if(!autoSave) return; clearTimeout(t); t=setTimeout(()=>saveAll(true),3000); }

function openPage(path){ const f=document.getElementById('live'); f.src=(path||'/')+'?_v='+Date.now(); }

function bindEditable(){
  const f=document.getElementById('live');
  const doc=f.contentDocument;
  if(!doc) return;

  // 文本可直接改
  doc.querySelectorAll('[data-key]').forEach(el=>{
    const k=el.getAttribute('data-key');
    if(!(k in data)) return;
    el.contentEditable='true';
    el.style.outline='none';
    el.style.cursor='text';
    el.onfocus=()=>{el.style.outline='2px dashed #2563eb'; setMsg('正在编辑：'+k)};
    el.onblur=()=>{el.style.outline='none'; data[k]=el.textContent.trim(); debounceSave();};
    el.oninput=()=>{data[k]=el.textContent.trim(); debounceSave();};
  });

  // 图片点一下可替换
  doc.querySelectorAll('[data-key-src]').forEach(el=>{
    const k=el.getAttribute('data-key-src');
    el.style.cursor='pointer';
    el.onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); imageKey=k; document.getElementById('pick').click(); setMsg('选择图片上传：'+k); };
    el.onmouseenter=()=>el.style.outline='2px dashed #16a34a';
    el.onmouseleave=()=>el.style.outline='none';
  });

  // 背景点一下可替换
  doc.querySelectorAll('[data-bg-key]').forEach(el=>{
    const k=el.getAttribute('data-bg-key');
    el.style.cursor='pointer';
    el.onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); imageKey=k; document.getElementById('pick').click(); setMsg('选择背景上传：'+k); };
    el.onmouseenter=()=>el.style.outline='2px dashed #f59e0b';
    el.onmouseleave=()=>el.style.outline='none';
  });
}

function pickImage(input){
  const f=input.files && input.files[0]; if(!f || !imageKey) return;
  const r=new FileReader();
  r.onload=()=>{
    data[imageKey]=r.result;
    const doc=document.getElementById('live').contentDocument;
    if(doc){
      doc.querySelectorAll(`[data-key-src="${imageKey}"]`).forEach(el=>el.src=r.result);
      doc.querySelectorAll(`[data-bg-key="${imageKey}"]`).forEach(el=>el.style.backgroundImage=`linear-gradient(rgba(10,56,136,.56),rgba(10,56,136,.62)),url(${r.result})`);
    }
    setMsg('已替换图片：'+imageKey);
    debounceSave();
  };
  r.readAsDataURL(f);
  input.value='';
}

async function saveAll(silent){
  const payload={...data};
  const pwd=localStorage.getItem('admin_pwd')||'';
  if(pwd) payload.password=pwd;
  let r=await fetch('/api/content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  let res=await r.json();
  if(r.status===401){
    const p=prompt('请输入后台保存密码');
    if(p){ localStorage.setItem('admin_pwd',p); payload.password=p; r=await fetch('/api/content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); res=await r.json(); }
  }
  setMsg(res.ok?(silent?'✅ 已自动保存':'✅ 保存成功'):'❌ 保存失败：'+(res.error||'未知错误'));
}

(async function init(){
  await loadData();
  const f=document.getElementById('live');
  f.addEventListener('load',()=>setTimeout(bindEditable,250));
  openPage('/');
})();
</script>
</body>
</html>
