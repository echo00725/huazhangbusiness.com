<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>可视化后台（纯预览编辑）</title>
  <style>
    body{margin:0;background:#0b1220;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    .bar{position:fixed;left:0;right:0;top:0;z-index:9999;display:flex;gap:8px;align-items:center;padding:10px 12px;background:rgba(9,14,26,.92);border-bottom:1px solid rgba(255,255,255,.15);flex-wrap:wrap}
    .btn{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;background:#1d4ed8;color:#fff}
    .btn.gray{background:#334155}
    .msg{font-size:12px;color:#d1d5db;margin-left:6px}
    #live{position:fixed;left:0;right:0;top:56px;bottom:0;width:100%;height:calc(100vh - 56px);border:0;background:#fff}
  </style>
</head>
<body>
  <div class="bar">
    <button class="btn gray" data-go="/">首页</button>
    <button class="btn gray" data-go="/scene.html">智能场景</button>
    <button class="btn gray" data-go="/iot.html">IoT</button>
    <button class="btn gray" data-go="/about.html">关于</button>
    <button class="btn gray" data-go="/contact.html">联系</button>
    <button class="btn" id="saveBtn">保存</button>
    <button class="btn gray" id="autoBtn">自动保存：开</button>
    <button class="btn gray" id="mapBtn">地图设置</button>
    <input id="pick" type="file" accept="image/*" style="display:none">
    <span id="msg" class="msg">直接点文字编辑；图片区域有“上传/清除”按钮</span>
  </div>
  <iframe id="live" src="/"></iframe>
  <script src="/admin.js"></script>
</body>
</html>
